{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100">
    <!-- Navigation Bar -->
    <nav
        class="fixed top-0 left-0 right-0 z-50 bg-slate-50 border-b border-slate-200 px-6 py-4 dark:bg-slate-900 dark:border-slate-700">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-slate-900 dark:text-slate-100 text-lg">Benjamin Holt</span>
            <!-- Nav links - hidden on mobile -->
            <div class="hidden md:flex items-center gap-6">
                <a href="#projects"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">Projects</a>
                <a href="#experience"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">Experience</a>
                <a href="#education"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">Education</a>
                <a href="#skills"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">Skills</a>
                <button id="theme-toggle"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm font-medium">
                    Dark Mode
                </button>
            </div>
            <!-- Mobile: just the toggle -->
            <div class="flex md:hidden">
                <button id="theme-toggle-mobile"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm font-medium">
                    Dark Mode
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="max-w-4xl mx-auto px-6 pt-32 pb-20 fade-in">
        <!-- Top row: stacked on mobile, side by side on desktop -->
        <div class="flex flex-col md:flex-row items-center md:items-center gap-8 mb-6">
            <img id="profile-image" src="" alt="Profile Photo"
                class="w-28 h-28 rounded-full object-cover border-4 border-blue-500 shadow-lg flex-shrink-0">
            <div class="border-l-0 md:border-l-4 border-blue-500 pl-0 md:pl-6 text-center md:text-left">
                <h1 id="name" class="text-5xl md:text-6xl font-bold text-slate-900 dark:text-slate-100"></h1>
                <h2 id="job-title" class="text-xl md:text-2xl font-medium text-blue-500 mt-2"></h2>
            </div>
        </div>
        <div id="bio" class="text-base text-slate-600 dark:text-slate-300 leading-relaxed mb-6"></div>
        <div class="flex gap-4">
            <a id="github-link" href="#"
                class="text-blue-500 hover:text-blue-700 font-medium transition-colors">GitHub</a>
            <a id="linkedin-link" href="#"
                class="text-blue-500 hover:text-blue-700 font-medium transition-colors">LinkedIn</a>
            <a id="email-link" href="#"
                class="text-blue-500 hover:text-blue-700 font-medium transition-colors">Email</a>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects"
        class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700 scroll-fade">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Projects</h3>
        <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Projects injected here by JavaScript -->
        </div>
    </section>

    <!-- Work Experience Section -->
    <section id="experience"
        class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700 scroll-fade">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Work Experience</h3>
        <div id="experience-container" class="flex flex-col gap-6">
            <!-- Experience injected here by JavaScript -->
        </div>
    </section>

    <!-- Education Section -->
    <section id="education"
        class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700 scroll-fade">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Education</h3>
        <div id="education-container" class="flex flex-col gap-6">
            <!-- Education injected here by JavaScript -->
        </div>
    </section>

    <!-- Skills Section -->
    <section id="skills"
        class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700 scroll-fade">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Skills</h3>
        <div id="skills-container" class="flex flex-col gap-6">
            <!-- Skills injected here by JavaScript -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-slate-200 dark:border-slate-700 mt-16">
        <div class="max-w-4xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <span class="text-slate-500 dark:text-slate-400 text-sm">© 2026 Benjamin Holt</span>
            <div class="flex gap-6">
                <a id="footer-github" href="#"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">GitHub</a>
                <a id="footer-linkedin" href="#"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">LinkedIn</a>
                <a id="footer-email" href="#"
                    class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm">Email</a>
            </div>
            <span class="text-slate-400 dark:text-slate-600 text-xs">Built with Django & Tailwind CSS</span>
        </div>
    </footer>

</div>

{% endblock %}
