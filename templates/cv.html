{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100">
    <!-- Navigation -->
    <nav
        class="fixed top-0 left-0 right-0 z-50 bg-slate-50 border-b border-slate-200 px-6 py-4 dark:bg-slate-900 dark:border-slate-700">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-slate-900 dark:text-slate-100 text-lg">Benjamin Holt</span>
            <button id="theme-toggle"
                class="text-slate-500 hover:text-blue-500 dark:text-slate-400 transition-colors text-sm font-medium">
                Dark Mode
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="max-w-4xl mx-auto px-6 pt-32 pb-20 fade-in">
        <!-- Top row: stacked on mobile, side by side on desktop -->
        <div class="flex flex-col md:flex-row items-center md:items-center gap-8 mb-6">
            <img id="profile-image" src="" alt="Profile Photo"
                class="w-28 h-28 rounded-full object-cover border-4 border-blue-500 shadow-lg flex-shrink-0">
            <div class="border-l-0 md:border-l-4 border-blue-500 pl-0 md:pl-6 text-center md:text-left">
                <h1 id="name" class="text-5xl md:text-6xl font-bold text-slate-900 dark:text-slate-100"></h1>
                <h2 id="job-title" class="text-xl md:text-2xl font-medium text-blue-500 mt-2"></h2>
            </div>
        </div>
        <div id="bio" class="text-base text-slate-600 dark:text-slate-300 leading-relaxed mb-6">
            <div class="flex gap-4">
                <a id="github-link" href="#"
                    class="text-blue-500 hover:text-blue-700 font-medium transition-colors">GitHub</a>
                <a id="linkedin-link" href="#"
                    class="text-blue-500 hover:text-blue-700 font-medium transition-colors">LinkedIn</a>
                <a id="email-link" href="#"
                    class="text-blue-500 hover:text-blue-700 font-medium transition-colors">Email</a>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Projects</h3>
        <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Projects injected here by JavaScript -->
        </div>
    </section>

    <!-- Work Experience Section -->
    <section class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Work Experience</h3>
        <div id="experience-container" class="flex flex-col gap-6">
            <!-- Experience injected here by JavaScript -->
        </div>
    </section>

    <!-- Education Section -->
    <section class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Education</h3>
        <div id="education-container" class="flex flex-col gap-6">
            <!-- Education injected here by JavaScript -->
        </div>
    </section>

    <!-- Skills Section -->
    <section class="max-w-4xl mx-auto px-6 py-16 border-t border-slate-200 dark:border-slate-700">
        <h3
            class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-8 pb-3 border-b-2 border-blue-500 inline-block">
            Skills</h3>
        <div id="skills-container" class="flex flex-col gap-6">
            <!-- Skills injected here by JavaScript -->
        </div>
    </section>

</div>

<script>
    // Fetch profile data
    fetch('/api/profile/')
        .then(response => response.json())
        .then(data => {
            const profile = data[0]
            document.getElementById('name').textContent = profile.full_name
            document.getElementById('profile-image').src = profile.profile_image
            document.getElementById('job-title').textContent = profile.job_title
            const bioText = profile.bio
                .split('\n')
                .map(paragraph => `<p class="mb-4">${paragraph}</p>`)
                .join('')
            document.getElementById('bio').innerHTML = bioText
            document.getElementById('github-link').href = profile.github_url
            document.getElementById('linkedin-link').href = profile.linkedin_url
            document.getElementById('email-link').href = 'mailto:' + profile.email
        })

    // Fetch skills data
    fetch('/api/skills/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('skills-container')

            const grouped = {}
            data.forEach(skill => {
                if (!grouped[skill.category]) {
                    grouped[skill.category] = []
                }
                grouped[skill.category].push(skill)
            })

            Object.keys(grouped).forEach(category => {
                const skills = grouped[category]
                container.innerHTML += `
                    <div>
                        <h4 class="text-sm font-semibold text-blue-500 uppercase tracking-widest mb-3">${category}</h4>
                        <div class="flex flex-wrap gap-2">
                            ${skills.map(skill => `
                                <span class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-3 py-1 rounded-full text-sm shadow-sm">
                                    ${skill.name}
                                    <span class="text-slate-400 dark:text-slate-500 text-xs ml-1">${skill.proficiency}</span>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `
            })
        })

    // Fetch work experience data
    fetch('/api/work-experience/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('experience-container')

            data.forEach(exp => {
                container.innerHTML += `
                    <div class="mb-6 pl-4 border-l-2 border-blue-500">
                        <h4 class="text-lg font-semibold text-slate-900 dark:text-slate-100">${exp.job_title} at ${exp.company}</h4>
                        <p class="text-sm text-slate-500 dark:text-slate-400">${exp.start_date} - ${exp.is_current ? 'Present' : exp.end_date}</p>
                        <p class="text-base text-slate-700 dark:text-slate-300 mt-2">${exp.description}</p>
                    </div>
                `
            })
        })

    // Fetch education data
    fetch('/api/education/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('education-container')

            data.forEach(edu => {
                container.innerHTML += `
                    <div class="mb-6 pl-4 border-l-2 border-blue-500">
                        <h4 class="text-lg font-semibold text-slate-900 dark:text-slate-100">${edu.degree}</h4>
                        <p class="text-sm text-slate-500 dark:text-slate-400">${edu.institution} • ${edu.start_date} - ${edu.is_current ? 'Present' : edu.end_date}</p>
                        <p class="text-base text-slate-700 dark:text-slate-300 mt-2">${edu.description}</p>
                    </div>
                `
            })
        })

    // Fetch projects data
    fetch('/api/projects/')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('projects-container')

            data.forEach(project => {
                container.innerHTML += `
                    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm overflow-hidden">
                        ${project.image ? `<img src="${project.image}" alt="${project.title}" class="w-full h-48 object-cover">` : ''}
                        <div class="p-4">
                            <h4 class="text-lg font-semibold text-slate-900 dark:text-slate-100">${project.title}</h4>
                            <p class="text-sm text-slate-500 dark:text-slate-400">${project.tech_stack}</p>
                            <p class="text-base text-slate-700 dark:text-slate-300 mt-2">${project.description}</p>
                            <div class="flex gap-4 mt-3">
                                <a href="${project.github_url}" target="_blank" class="text-blue-500 hover:text-blue-700 font-medium text-sm">GitHub</a>
                                <a href="${project.live_url}" target="_blank" class="text-blue-500 hover:text-blue-700 font-medium text-sm">Live Demo</a>
                            </div>
                        </div>
                    </div>
                `
            })
        })

    // Dark mode toggle
    const themeToggle = document.getElementById('theme-toggle')
    themeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark')
        themeToggle.textContent = document.documentElement.classList.contains('dark')
            ? 'Light Mode'
            : 'Dark Mode'
    })
</script>

{% endblock %}
